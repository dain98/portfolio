<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c1810"/>
      <stop offset="100%" style="stop-color:#1e1410"/>
    </linearGradient>
    <linearGradient id="steam" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#d4c4b0;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#d4c4b0;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)" rx="0"/>

  <!-- Subtle grain dots -->
  <g opacity="0.06">
    <circle cx="100" cy="50" r="2" fill="#d4c4b0"/>
    <circle cx="250" cy="120" r="1.5" fill="#d4c4b0"/>
    <circle cx="400" cy="80" r="2" fill="#d4c4b0"/>
    <circle cx="600" cy="40" r="1.5" fill="#d4c4b0"/>
    <circle cx="800" cy="100" r="2" fill="#d4c4b0"/>
    <circle cx="950" cy="60" r="1.5" fill="#d4c4b0"/>
    <circle cx="1100" cy="90" r="2" fill="#d4c4b0"/>
    <circle cx="150" cy="260" r="1.5" fill="#d4c4b0"/>
    <circle cx="350" cy="220" r="2" fill="#d4c4b0"/>
    <circle cx="550" cy="280" r="1.5" fill="#d4c4b0"/>
    <circle cx="750" cy="240" r="2" fill="#d4c4b0"/>
    <circle cx="1000" cy="270" r="1.5" fill="#d4c4b0"/>
    <circle cx="1200" cy="250" r="2" fill="#d4c4b0"/>
  </g>

  <!-- Coffee cup -->
  <g transform="translate(140, 100)">
    <!-- Saucer -->
    <ellipse cx="60" cy="155" rx="68" ry="12" fill="#5c3d2e" opacity="0.5"/>
    <ellipse cx="60" cy="152" rx="65" ry="10" fill="#faf6f0" opacity="0.15"/>

    <!-- Cup body -->
    <path d="M5 30 C5 32, 4 34, 4 36 C4 68, 25 95, 60 95 C95 95, 116 68, 116 36 C116 34, 115 32, 115 30 Z" fill="#faf6f0" opacity="0.9"/>
    <path d="M5 30 C5 32, 4 34, 4 36 C4 68, 25 95, 60 95 C95 95, 116 68, 116 36 C116 34, 115 32, 115 30 Z" fill="none" stroke="#d4c4b0" stroke-width="1.5"/>

    <!-- Cup rim -->
    <ellipse cx="60" cy="30" rx="55" ry="12" fill="#faf6f0" opacity="0.9"/>
    <ellipse cx="60" cy="30" rx="55" ry="12" fill="none" stroke="#d4c4b0" stroke-width="1.5"/>

    <!-- Coffee surface -->
    <ellipse cx="60" cy="32" rx="48" ry="8" fill="#c8956c"/>

    <!-- Latte art heart -->
    <path d="M60 27 C56 23, 48 23, 48 28 C48 33, 60 38, 60 38 C60 38, 72 33, 72 28 C72 23, 64 23, 60 27Z" fill="#f5efe6" opacity="0.7"/>

    <!-- Handle -->
    <path d="M116 42 C116 42, 128 42, 132 50 C136 58, 134 72, 126 76 C122 78, 116 76, 116 76" fill="none" stroke="#d4c4b0" stroke-width="1.5"/>

    <!-- Steam wisps -->
    <path d="M40 20 C30 8, 50 2, 38 -10 C26 -22, 48 -28, 36 -40" fill="none" stroke="url(#steam)" stroke-width="2.5" stroke-linecap="round">
      <animate attributeName="d" dur="3s" repeatCount="indefinite" values="M40 20 C30 8, 50 2, 38 -10 C26 -22, 48 -28, 36 -40;M40 20 C50 8, 30 2, 42 -10 C54 -22, 32 -28, 44 -40;M40 20 C30 8, 50 2, 38 -10 C26 -22, 48 -28, 36 -40"/>
    </path>
    <path d="M60 18 C70 6, 50 0, 62 -12 C74 -24, 52 -30, 64 -42" fill="none" stroke="url(#steam)" stroke-width="2" stroke-linecap="round">
      <animate attributeName="d" dur="3.5s" repeatCount="indefinite" values="M60 18 C70 6, 50 0, 62 -12 C74 -24, 52 -30, 64 -42;M60 18 C50 6, 70 0, 58 -12 C46 -24, 68 -30, 56 -42;M60 18 C70 6, 50 0, 62 -12 C74 -24, 52 -30, 64 -42"/>
    </path>
    <path d="M80 20 C90 10, 70 4, 82 -8 C94 -20, 72 -26, 84 -38" fill="none" stroke="url(#steam)" stroke-width="2" stroke-linecap="round">
      <animate attributeName="d" dur="4s" repeatCount="indefinite" values="M80 20 C90 10, 70 4, 82 -8 C94 -20, 72 -26, 84 -38;M80 20 C70 10, 90 4, 78 -8 C66 -20, 88 -26, 76 -38;M80 20 C90 10, 70 4, 82 -8 C94 -20, 72 -26, 84 -38"/>
    </path>
  </g>

  <!-- Warm glow behind cup -->
  <circle cx="200" cy="180" r="120" fill="#c8956c" opacity="0.06"/>

  <!-- Title text -->
  <text x="640" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="72" fill="#f5efe6" letter-spacing="2">
    dain.cafe
  </text>

  <!-- Tagline -->
  <text x="640" y="175" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#c8956c" opacity="0.8" font-style="italic">
    AI Engineer · building things that just work
  </text>

  <!-- Decorative line -->
  <line x1="540" y1="195" x2="740" y2="195" stroke="#c4653a" stroke-width="1" opacity="0.4"/>

  <!-- Subtitle -->
  <text x="640" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#9a8578" letter-spacing="3">
    PORTFOLIO
  </text>

  <!-- Right side coffee beans -->
  <g transform="translate(1050, 110) rotate(-30)" opacity="0.15">
    <ellipse cx="0" cy="0" rx="18" ry="12" fill="#d4c4b0"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#2c1810" stroke-width="1.5"/>
  </g>
  <g transform="translate(1100, 160) rotate(15)" opacity="0.12">
    <ellipse cx="0" cy="0" rx="15" ry="10" fill="#d4c4b0"/>
    <line x1="-11" y1="0" x2="11" y2="0" stroke="#2c1810" stroke-width="1.5"/>
  </g>
  <g transform="translate(1080, 200) rotate(-45)" opacity="0.10">
    <ellipse cx="0" cy="0" rx="14" ry="9" fill="#d4c4b0"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#2c1810" stroke-width="1.5"/>
  </g>
</svg>
